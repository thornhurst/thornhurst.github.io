<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Voucher Redemption Portal | Thornhurst Manor</title>
    <meta name="description" content="Check and redeem vouchers with the DigiTickets platform.">
    <!-- Developed by y3kdaniel.uk -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" integrity="sha512-jnSuA4Ss2PkkikSOLtYs8BlYIeeIK1h99ty4YfvRPAlzr377vr3CXDb7sb7eEEBYjDtcYj+AjBH3FLv5uSJuXg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      :root {
        --thornhurstGreen:    #163932;
        --thornhurstGold1:    #A2764E;
        --thornhurstGold2:    #E7D3B8;
      }
      html {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100%;
        margin: 0;
        color: #fff;
        background: var(--thornhurstGreen);
      }
      main {
        flex: 0 auto;
        text-align: center;
      }
      footer {
        margin-bottom: 10px;
      }

      #appVersion {
        position: absolute;
        right: 5px;
        bottom: 5px;
        color: #fff;
      }

      .alert-primary {
          color: #4f3926;
          background-color: #e9ddd2;
          border-color: #e2d3c4;
      }

      .alert-primary hr {
          border-top-color: #dac6b3;
      }

      .alert-primary .alert-link {
          color: #2c2015;
      }

      .badge-primary {
          color: #fff;
          background-color: #A2764E;
      }

      .badge-primary[href]:hover, .badge-primary[href]:focus {
          color: #fff;
          background-color: #7f5c3d;
      }

      .bg-primary {
          background-color: #A2764E !important;
      }

      a.bg-primary:hover, a.bg-primary:focus,
      button.bg-primary:hover,
      button.bg-primary:focus {
          background-color: #7f5c3d !important;
      }

      .border-primary {
          border-color: #A2764E !important;
      }

      .btn-primary {
          color: #fff;
          background-color: #A2764E;
          border-color: #A2764E;
      }

      .btn-primary:hover {
          color: #fff;
          background-color: #896442;
          border-color: #7f5c3d;
      }

      .btn-primary:focus, .btn-primary.focus {
          box-shadow: 0 0 0 0.2rem rgba(162, 118, 78, 0.5);
      }

      .btn-primary.disabled, .btn-primary:disabled {
          color: #fff;
          background-color: #A2764E;
          border-color: #A2764E;
      }

      .btn-primary:not(:disabled):not(.disabled):active, .btn-primary:not(:disabled):not(.disabled).active, .show > .btn-primary.dropdown-toggle {
          color: #fff;
          background-color: #7f5c3d;
          border-color: #755538;
      }

      .btn-primary:not(:disabled):not(.disabled):active:focus, .btn-primary:not(:disabled):not(.disabled).active:focus, .show > .btn-primary.dropdown-toggle:focus {
          box-shadow: 0 0 0 0.2rem rgba(162, 118, 78, 0.5);
      }

      .btn-outline-primary {
          color: #A2764E;
          background-color: transparent;
          border-color: #A2764E;
      }

      .btn-outline-primary:hover {
          color: #fff;
          background-color: #A2764E;
          border-color: #A2764E;
      }

      .btn-outline-primary:focus, .btn-outline-primary.focus {
          box-shadow: 0 0 0 0.2rem rgba(162, 118, 78, 0.5);
      }

      .btn-outline-primary.disabled, .btn-outline-primary:disabled {
          color: #A2764E;
          background-color: transparent;
      }

      .btn-outline-primary:not(:disabled):not(.disabled):active, .btn-outline-primary:not(:disabled):not(.disabled).active, .show > .btn-outline-primary.dropdown-toggle {
          color: #fff;
          background-color: #A2764E;
          border-color: #A2764E;
      }

      .btn-outline-primary:not(:disabled):not(.disabled):active:focus, .btn-outline-primary:not(:disabled):not(.disabled).active:focus, .show > .btn-outline-primary.dropdown-toggle:focus {
          box-shadow: 0 0 0 0.2rem rgba(162, 118, 78, 0.5);
      }

      .list-group-item-primary {
          color: #4f3926;
          background-color: #e2d3c4;
      }

      .list-group-item-primary.list-group-item-action:hover, .list-group-item-primary.list-group-item-action:focus {
          color: #4f3926;
          background-color: #dac6b3;
      }

      .list-group-item-primary.list-group-item-action.active {
          color: #fff;
          background-color: #4f3926;
          border-color: #4f3926;
      }

      .table-primary,
      .table-primary > th,
      .table-primary > td {
          background-color: #e2d3c4;
      }

      .table-hover .table-primary:hover {
          background-color: #dac6b3;
      }

      .table-hover .table-primary:hover > td,
      .table-hover .table-primary:hover > th {
          background-color: #dac6b3;
      }

      .text-primary {
          color: #A2764E !important;
      }

      a.text-primary:hover, a.text-primary:focus {
          color: #7f5c3d !important;
      }

      .nav-scroller {
        position: relative;
        z-index: 2;
        height: 2.75rem;
        overflow-y: hidden;
      }
      .nav-scroller .nav {
        display: flex;
        flex-wrap: nowrap;
        padding-bottom: 1rem;
        margin-top: -1px;
        overflow-x: auto;
        text-align: center;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
      }

      .form-login {
        max-width: 330px;
        padding: 15px;
      }
      .form-login .form-floating:focus-within {
        z-index: 2;
      }
      .form-login label {
        color: #000;
      }
      .form-login input[type="text"] {
        margin-bottom: -1px;
        border-bottom-right-radius: 0;
        border-bottom-left-radius: 0;
      }
      .form-login input[type="password"] {
        margin-bottom: 10px;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
      }

      .form-check {
        max-width: 330px;
        padding: 15px;
      }
      .form-check .form-floating:focus-within {
        z-index: 2;
      }
      .form-check label {
        color: #000;
      }
      .form-check input[type="text"] {
        margin-bottom: 10px;
      }
      .form-check select {
        margin-bottom: 10px;
      }
      .form-check button {
        margin-bottom: 10px;
      }

      .inherit {
        all:inherit;
      }
    </style>
  </head>
  <body>
    <header class="d-flex justify-content-center">
      <img src="https://app.digitickets.co.uk/userfiles/companies/manorlogo-main_page.320x160.png?aoe=1&far=1">
      <span style="position:relative;top:25px;width:10px;height:120px;border-left: 1px solid"></span>
      <span class="h3" style="position:relative; top:30px;">Gift Voucher<br/>Redemption<br/>Portal</span>
    </header>

    <main id="flowLogin" class="form-login w-100 m-auto" hidden>
      <form class="needs-validation" action="/" id="loginForm">
        <h1 class="h3 mb-3 fw-normal">Sign In</h1>
        <div class="alert alert-danger align-items-center" id="loginAlert" role="alert" style="display:flex;" hidden>
          <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:"><use xlink:href="#exclamation-triangle-fill"/></svg>
          <div id="loginAlertText">Your error message goes here...</div>
        </div>
        <div class="form-floating">
          <input type="text" class="form-control" id="loginUsername" placeholder="joebloggs.thornhurst" required>
          <label for="loginUsername">Username</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
          <label for="loginPassword">Password</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
      </form>
    </main>

    <main id="flowCheck" class="form-check w-100 m-auto" hidden>
      <form class="needs-validation" action="/" id="checkForm">
        <h1 class="h3 mb-3 fw-normal">Check Voucher</h1>
        <div class="alert alert-danger align-items-center" id="checkAlert" role="alert" style="display:flex;" hidden>
          <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:"><use xlink:href="#exclamation-triangle-fill"/></svg>
          <div id="checkAlertText">Your error message goes here...</div>
        </div>
        <div class="alert alert-success align-items-center" id="checkSuccess" role="alert" style="display:flex;" hidden>
          <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Success:"><use xlink:href="#check-circle-fill"/></svg>
          <div id="checkSuccessText">Your success message goes here...</div>
        </div>
        <div class="form-floating">
          <input type="text" class="form-control" id="voucherReference" placeholder="ABCDEFG1234567" required>
          <label for="voucherReference">Voucher Reference</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Check</button>
      </form>
    </main>

    <main id="flowRedeemBalance" class="form-check w-100 m-auto" hidden>
      <form class="needs-validation" action="/" id="redeemBalanceForm">
        <h1 class="h3 mb-3 fw-normal">Redeem Voucher</h1>
        <h6 id="redeemBalanceVoucherDetails"></h6>
        <div class="alert alert-danger align-items-center" id="redeemBalanceAlert" role="alert" style="display:flex;" hidden>
          <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:"><use xlink:href="#exclamation-triangle-fill"/></svg>
          <div id="redeemBalanceAlertText">Your error message goes here...</div>
        </div>
        <div class="form-floating">
          <input type="text" class="form-control" id="redeemBalanceValue" placeholder="10.00" required>
          <label for="redeemBalanceValue">Redemption Value</label>
        </div>
        <div class="form-floating">
          <select class="form-select" id="redeemBalanceSelect" aria-label="Default select example" required>
            <option disabled value="">Select product:</option>
          </select>
          <label for="redeemBalanceSelect">Redemption Product</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Redeem</button>
      </form>
      <button class="w-100 btn btn-lg btn-danger" id="redeemBalanceCancel" type="button">Cancel</button>
    </main>

    <main id="flowRedeemExperience" class="form-check w-100 m-auto" hidden>
      <form class="needs-validation" action="/" id="redeemExperienceForm">
        <h1 class="h3 mb-3 fw-normal">Redeem Voucher</h1>
        <h6 id="redeemExperienceVoucherDetails"></h6>
        <div class="alert alert-danger align-items-center" id="redeemExperienceAlert" role="alert" style="display:flex;" hidden>
          <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:"><use xlink:href="#exclamation-triangle-fill"/></svg>
          <div id="redeemExperienceAlertText">Your error message goes here...</div>
        </div>
        <div class="form-floating">
          <select class="form-select" id="redeemExperienceSelect" aria-label="Default select example" required>
            <option disabled value="">Select product:</option>
          </select>
          <label for="redeemExperienceSelect">Redemption Product</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Redeem</button>
      </form>
      <button class="w-100 btn btn-lg btn-danger" id="redeemExperienceCancel" type="button">Cancel</button>
    </main>

    <footer class="d-flex justify-content-between">
      <button class="btn btn-lg btn-primary" type="submit" id="logoutButton" hidden>Sign out</button>
      <span id="appVersion">Version</span>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js" integrity="sha512-TPh2Oxlg1zp+kz3nFA0C5vVC6leG/6mm1z9+mA81MI5eaUVqasPLO8Cuk4gMF4gUfP5etR73rgU/8PNMsSesoQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.min.js" integrity="sha512-ykZ1QQr0Jy/4ZkvKuqWn4iF3lqPZyij9iRv6sGqLRdTPkY69YX6+7wvVGmsdBbiIfN/8OdsI7HABjvEok6ZopQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      $( window ).on( "load", function() {
        $('#appVersion').html("v"+version);
        if(sessionStorage.getItem("user") != null){
          user.data = JSON.parse(sessionStorage.getItem("user"));
          if(sessionStorage.getItem("voucher") != null){
            voucher.data = JSON.parse(sessionStorage.getItem("voucher"));
            $('#logoutButton').prop("hidden",false);
            voucher.redeemLoad();
          }else{
            $('#flowCheck').prop("hidden",false);
            $('#logoutButton').prop("hidden",false);
            $("#voucherReference").focus();
          }
        }else{
          $('#flowLogin').prop("hidden",false);
          $("#loginUsername").focus();
        }
        $( "#loginForm" ).submit(function( event ){
            event.preventDefault();
            user.login();
        });
        $( "#checkForm" ).submit(function( event ){
          event.preventDefault();
          voucher.check();
        });
        $( "#redeemBalanceForm" ).submit(function( event ){
          event.preventDefault();
          voucher.redeemBalance();
        });
        $( "#redeemBalanceCancel").click(function( event ){
          voucher.redeemCancel();
        });
        $( "#redeemExperienceForm" ).submit(function( event ){
          event.preventDefault();
          voucher.redeemExperience();
        });
        $( "#redeemExperienceCancel").click(function( event ){
          voucher.redeemCancel();
        });
        $( "#logoutButton" ).click(function( event ){
            event.preventDefault();
            user.logout();
        });

      });

      settings = {
        branchID : 2514,
      };

      user = {
        data : {},

        login : function(){
          $('loginAlert').hide();
          $.post( "https://api.digitickets.co.uk/v2/users/auth", {
            username: $('#loginUsername').val(),
            password: $('#loginPassword').val()
          }, "json")
            .done(function(data) {
              user.data = JSON.parse(JSON.stringify(data.user));
              //alert(JSON.stringify(this.user.data.apiKey));
              sessionStorage.setItem("user", JSON.stringify(data.user));
              $('#logoutButton').prop("hidden",false);
              $('#flowLogin').prop("hidden",true);
              $('#flowCheck').prop("hidden",false);
              $("#voucherReference").focus();
            })
            .fail(function(data) {
              $('#loginAlertText').html(data.responseJSON.message);
              $('#loginAlert').prop("hidden",false);
            })
            .always(function(data) {
              $('#loginUsername').val('');
              $('#loginPassword').val('');
            });
        },

        logout : function(){
           sessionStorage.clear();
           user.data = {};
           voucher.data = {};
           $('#flowLogin').prop("hidden",false);
           $('#flowCheck').prop("hidden",true);
           $('#flowRedeemBalance').prop("hidden",true);
           $('#flowRedeemExperience').prop("hidden",true);
           $('#logoutButton').prop("hidden",true);
           $("#loginUsername").focus();
        },
      };

      voucher = {
        data : {},
        reservation : {},

        check : function(){
          voucher.data = {};
          $('#checkAlert').prop("hidden",true);
          $('#checkSuccess').prop("hidden",true);
          $.getJSON( "https://api.digitickets.co.uk/v2/soldgiftvouchers", {
            apiKey: user.data.apiKey,
            ref: $('#voucherReference').val(),
            isoDates: "1",
            resolve: "giftvoucher,recipient"
          } )
            .done(function( data ) {
              if(!Object.keys(data).length){
                $('#checkAlertText').html("Voucher was not found!");
                $('#checkAlert').prop("hidden",false);
              }else{
                voucher.data = JSON.parse(JSON.stringify(data[0]));
                if(voucher.data.status == "Inactive") {
                  $('#checkAlertText').html("Voucher was revoked!");
                  $('#checkAlert').prop("hidden",false);
                }else if(voucher.data.initialBalance > 0 && voucher.data.currentBalance === 0){
                  var d = new Date(voucher.data.redeemedAt);
                  $('#checkAlertText').html("Voucher balance has already been redeemed!<br/>"+d.toUTCString());
                  $('#checkAlert').prop("hidden",false);
                }else if(voucher.data.redeemedAt !== null) {
                  var d = new Date(voucher.data.redeemedAt);
                  $('#checkAlertText').html("Voucher already redeemed!<br/>"+d.toUTCString());
                  $('#checkAlert').prop("hidden",false);
                }else if(d = new Date(voucher.data.expiresAt) < new Date()){
                  $('#checkAlertText').html("Voucher has expired!<br/>"+d.toLocaleString());
                  $('#checkAlert').prop("hidden",false);
                }else{
                  sessionStorage.setItem("voucher", JSON.stringify(data[0]));
                  voucher.redeemLoad();
                }
              }
            })
            .fail(function(data) {
              $('#checkAlertText').html("We were unable to check that voucher at this time!<br/>Trace: "+data.responseJSON.error);
              $('#checkAlert').prop("hidden",false);
              setTimeout($('#checkAlert').prop("hidden",false), 15000);
            })
            .always(function(data){
              $('#voucherReference').val('');
            });
        },

        redeemLoad : function(){
          $('#redeemBalanceSelect').empty();
          $('#redeemExperienceSelect').empty();
          if(voucher.data.giftvoucher.giftVoucherType === "Balance")
            voucher.data.giftvoucher.validForItemIDs = ["419159","419160"];
          if(voucher.data.giftvoucher.validForCatIDs === null && voucher.data.giftvoucher.validForItemIDs === null){
            $('#checkAlertText').html("This voucher can be redeemed for any item, however this portal is unable to process this type of redemption.<br/>Voucher: "+voucher.data.ref);
            $('#checkAlert').prop("hidden",false);
            setTimeout($('#checkAlert').prop("hidden",false), 15000);
            voucher.redeemCancel();
            return;
          }else if(!voucher.data.giftvoucher.validItems){
            voucher.data.giftvoucher.validItems = [];
            if(voucher.data.giftvoucher.validForCatIDs !== null){
              alert("This voucher can be redeemed for all items in specific categories, however these are not yet available in this portal! Any individual ticket items will still be shown!");
            }
            if(voucher.data.giftvoucher.validForItemIDs !== null){
              voucher.data.giftvoucher.validForItemIDs.forEach(function(itemID) {
                $.ajaxSetup({async: false});
                $.getJSON( "https://api.digitickets.co.uk/v2/tickets/"+itemID, {
                  apiKey: user.data.apiKey,
                  branchID: settings.branchID,
                  isoDates: "1"
                  //resolve: "giftvoucher,recipient"
                } )
                  .done(function( data ) {
                    if(data){
                      itemData = JSON.parse(JSON.stringify(data));
                      if(itemData.status === "Active" && (itemData.displayFrom === null || new Date(itemData.displayFrom) < new Date()) && (itemData.displayUntil === null || new Date(itemData.displayUntil) > new Date())) {
                        voucher.data.giftvoucher.validItems[itemData.itemID] = itemData;
                        $('#redeemBalanceSelect').append($('<option>', { value: itemData.itemID, text: itemData.name}));
                        $('#redeemExperienceSelect').append($('<option>', { value: itemData.itemID, text: itemData.name}));
                      }
                    }
                  })
              });
            }
          }
          if(!Object.keys(voucher.data.giftvoucher.validItems).length){
            $('#checkAlertText').html("No items are available to redeem for this voucher, at this time only tickets not attached to an event can be used in this portal.<br/>Voucher: "+voucher.data.ref);
            $('#checkAlert').prop("hidden",false);
            setTimeout($('#checkAlert').prop("hidden",false), 15000);
            voucher.redeemCancel();
            return;
          }

          switch(voucher.data.giftvoucher.giftVoucherType){
            case 'Balance':
              $('#redeemBalanceVoucherDetails').html(""+
                "<b>Reference:</b> "+voucher.data.ref+"<br/>"+
                "<b>Type:</b> "+voucher.data.giftvoucher.name+"<br/>"+
                "<b>Remaining Balance:</b> £"+voucher.data.currentBalance+"<br/>"+
                "<b>Recipient:</b> "+voucher.data.recipient.firstName+" "+voucher.data.recipient.lastName+"<br/>"+
                "<b>Expires:</b> "+new Date(voucher.data.expiresAt).toLocaleString()+"<br/>"+
                //"<b>Message:</b> "+voucher.data.recipientMessage.replace(/(\r\n|\r|\n)/g, '<br/>')+
                "&nbsp;");
              $('#redeemBalanceValue').val(voucher.data.currentBalance);
              $('#flowCheck').prop("hidden",true);
              $('#flowRedeemBalance').prop("hidden",false);
              $("#redeemBalanceValue").focus();
              break
            case 'Experience':
              $('#redeemExperienceVoucherDetails').html(""+
                "<b>Reference:</b> "+voucher.data.ref+"<br/>"+
                "<b>Type:</b> "+voucher.data.giftvoucher.name+"<br/>"+
                "<b>Recipient:</b> "+voucher.data.recipient.firstName+" "+voucher.data.recipient.lastName+"<br/>"+
                "<b>Expires:</b> "+new Date(voucher.data.expiresAt).toLocaleString()+"<br/>"+
                //"<b>Message:</b> "+voucher.data.recipientMessage.replace(/(\r\n|\r|\n)/g, '<br/>')+
                "&nbsp;");
              $('#flowCheck').prop("hidden",true);
              $('#flowRedeemExperience').prop("hidden",false);
              $("#redeemExperienceSelect").focus();
              break
            default:
              $('#checkAlertText').html(voucher.data.giftvoucher.giftVoucherType+" Vouchers are not currently supported in the redemption portal!");
              $('#checkAlert').prop("hidden",false);
              setTimeout($('#checkAlert').prop("hidden",false), 15000);
              voucher.redeemCancel();
          }
        },

        redeemBalance : function(){
          $('#redeemBalanceAlert').prop("hidden",true);
          redeemValue = $('#redeemBalanceValue').val();

          if(redeemValue == 0){
            $('#redeemBalanceAlertText').html("You must enter a value to redeem, check your Redemption Value and try again!");
            $('#redeemBalanceAlert').prop("hidden",false);
            return;
          }

          if(redeemValue > voucher.data.currentBalance){
            $('#redeemBalanceAlertText').html("You can not redeem more than the remaining balance, check your Redemption Value and try again!");
            $('#redeemBalanceAlert').prop("hidden",false);
            return;
          }

          reservationBody = {
            "lines": [
              {
                "branchID": settings.branchID,
                "itemID": $('#redeemBalanceSelect').val(),
                "qty": 1,
                "price": redeemValue,
                "baseTotal": redeemValue,
                //"discountedBaseTotal": 0,
                "lineTotal": redeemValue,//0,
                //"discountAmount": redeemValue,
              }
            ],
          };
          $.ajax({
            type: "POST",
            url: "https://api.digitickets.co.uk/v2/reservations?apiKey="+user.data.apiKey,
            data: JSON.stringify(reservationBody),
            contentType : 'application/json',
            dataType: "json"
          })
          .done(function( data ) {
            voucher.reservation = JSON.parse(JSON.stringify(data.reservation));
          })
